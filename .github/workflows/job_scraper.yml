name: Daily Job Filter

on:
  schedule:
    # Runs at 15:30 UTC = 9:00 PM IST every day
    - cron: "30 15 * * *"

  # Allow manual runs from the GitHub Actions UI for testing
  workflow_dispatch:

# Declare write access so the workflow can push seen_jobs.json back to main
permissions:
  contents: write

jobs:
  run-pipeline:
    name: Run Job-Filtering Pipeline
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with full history for clean rebasing ──────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python 3.12 ──────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Cache pip dependencies ──────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Execute the pipeline ────────────────────────────────────────
      #       Secrets are injected as environment variables only — they
      #       are never written to disk or logged.
      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add seen_jobs.json

          if ! git diff --cached --quiet; then
            git commit -m "Automated tracking update [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
